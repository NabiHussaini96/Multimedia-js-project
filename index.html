<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimedia Projekt</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8f9fa;
            text-align: center;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        video, audio {
            margin: 20px 0;
            width: 80%;
            max-width: 500px;
        }

        .controls {
            margin: 15px 0;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            background: #0d6efd;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #0b5ed7;
        }

        input[type="range"] {
            width: 200px;
        }

        canvas {
            border: 2px solid black;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>🎬 Multimedia & JavaScript Projekt</h1>

    <!-- VIDEO -->
    <h2>Video</h2>
    <video id="videoPlayer" controls>
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        Din webbläsare stödjer inte video.
    </video>

    <!-- AUDIO -->
    <h2>Ljud</h2>
    <audio id="audioPlayer">
        <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mpeg">
        Din webbläsare stödjer inte ljud.
    </audio>

    <!-- CUSTOM CONTROLS -->
    <div class="controls">
        <button onclick="playMedia()">▶️ Spela</button>
        <button onclick="pauseMedia()">⏸️ Pausa</button>
        <br><br>
        Volym:
        <input type="range" min="0" max="1" step="0.1" onchange="changeVolume(this.value)">
    </div>

    <!-- CANVAS -->
    <h2>Canvas Interaktion</h2>
    <canvas id="myCanvas" width="300" height="200"></canvas>
    <br>
    <button onclick="changeColor()">Byt färg</button>

    <script src="script.js"></script>

</body>
</html>
