<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Multimedia projekt med video, ljud och JavaScript interaktioner">
    <title>Multimedia Projekt</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8f9fa;
            text-align: center;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        video, audio {
            margin: 20px 0;
            width: 80%;
            max-width: 500px;
        }

        .controls {
            margin: 15px 0;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            background: #0d6efd;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #0b5ed7;
        }

        input[type="range"] {
            width: 200px;
        }

        canvas {
            border: 2px solid black;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<header>
    <h1>🎬 Multimedia & JavaScript Projekt</h1>
</header>

<main>

    <!-- VIDEO -->
    <section>
        <h2>Video</h2>

        <video id="videoPlayer" controls aria-label="Video spelare">
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">

            <!-- Captions -->
            <track kind="captions" srclang="sv" label="Svenska">
            
            Din webbläsare stödjer inte video.
        </video>
    </section>

    <!-- AUDIO -->
    <section>
        <h2>Ljud</h2>

        <audio id="audioPlayer" controls aria-label="Ljudspelare">
            <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mpeg">
            Din webbläsare stödjer inte ljud.
        </audio>
    </section>

    <!-- CONTROLS -->
    <section class="controls">
        <h2>Kontroller</h2>

        <button onclick="playMedia()" aria-label="Spela media">▶️ Spela</button>
        <button onclick="pauseMedia()" aria-label="Pausa media">⏸️ Pausa</button>

        <br><br>

        <label for="volume">Volym:</label>
        <input 
            type="range" 
            id="volume"
            min="0" 
            max="1" 
            step="0.1" 
            onchange="changeVolume(this.value)"
        >
    </section>

    <!-- CANVAS -->
    <section>
        <h2>Canvas Interaktion</h2>

        <canvas id="myCanvas" width="300" height="200" aria-label="Canvas ritområde"></canvas>
        <br>

        <button onclick="changeColor()" aria-label="Byt färg på canvas">Byt färg</button>
    </section>

</main>

<script src="script.js"></script>

</body>
</html>
